<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Box Cricket Score Counter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Box Cricket Score Counter</h1>

    <div class="teams">
      <input type="text" id="teamA" placeholder="Team A Name" />
      <input type="text" id="teamB" placeholder="Team B Name" />
    </div>

    <div class="scoreboard">
      <h2 id="scoreDisplay">Score: 0/0</h2>
      <h3 id="overDisplay">Overs: 0.0</h3>

      <div class="buttons">
        <button onclick="addRun(1)">+1 Run</button>
        <button onclick="addRun(4)">+4 Runs</button>
        <button onclick="addRun(6)">+6 Runs</button>
        <button onclick="addWicket()">Wicket</button>
        <button onclick="addBall()">Dot Ball</button>
        <button onclick="resetMatch()">Reset</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
